name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

# Composer 2.9+ blocks advisory-affected packages during resolution.
# Laravel 11.x (through at least v11.54) is flagged with no patched release,
# so advisory blocking must be disabled for the L11 matrix legs.
env:
  COMPOSER_NO_SECURITY_BLOCKING: "1"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*', '12.*', '13.*']
        stability: [prefer-stable]
        include:
          - laravel: '10.*'
            testbench: '8.*'
            phpunit: '10.*'
          - laravel: '11.*'
            testbench: '9.*'
            phpunit: '11.*'
          - laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'
          - laravel: '13.*'
            testbench: '11.*'
            phpunit: '12.*'
        exclude:
          # Laravel 10 supports PHP 8.1–8.3
          - laravel: '10.*'
            php: '8.4'
          # Laravel 11 requires PHP 8.2+
          - laravel: '11.*'
            php: '8.1'
          # Laravel 12 requires PHP 8.2+
          - laravel: '12.*'
            php: '8.1'
          # Laravel 13 requires PHP 8.3+
          - laravel: '13.*'
            php: '8.1'
          - laravel: '13.*'
            php: '8.2'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          composer require \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            --no-interaction --no-update
          composer require \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --dev --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --colors=always
